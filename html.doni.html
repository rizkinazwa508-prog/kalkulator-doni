```html id="greenbears1"
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kalkulator Hijau Lucu</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg, #b8ffb8, #43c06b);
    }

    .calculator{
      width:340px;
      background:#effff1;
      padding:20px;
      border-radius:25px;
      box-shadow:0 0 25px rgba(0, 128, 0, 0.3);
      border:4px solid #58cc77;
      position:relative;
    }

    /* gambar lucu */
    .cute{
      text-align:center;
      font-size:55px;
      margin-bottom:10px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-8px);
      }
    }

    .display{
      width:100%;
      height:70px;
      background:#dfffe4;
      color:#1b7f3c;
      font-size:32px;
      text-align:right;
      padding:15px;
      border:none;
      border-radius:15px;
      margin-bottom:15px;
      overflow:hidden;
      font-weight:bold;
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
    }

    button{
      height:60px;
      border:none;
      border-radius:15px;
      font-size:22px;
      cursor:pointer;
      transition:0.2s;
      font-weight:bold;
    }

    button:hover{
      transform:scale(1.05);
      opacity:0.9;
    }

    .number{
      background:#8ee3a1;
      color:white;
    }

    .operator{
      background:#43c06b;
      color:white;
    }

    .equal{
      background:#00a86b;
      color:white;
    }

    .clear{
      background:#2e8b57;
      color:white;
    }
  </style>
</head>
<body>

  <div class="calculator">

    <!-- gambar lucu -->
    <div class="cute">🐻💚🐻</div>

    <input type="text" class="display" id="display" value="0" readonly>

    <div class="buttons">
      <button class="clear" onclick="clearDisplay()">C</button>
      <button class="operator" onclick="appendValue('%')">%</button>
      <button class="operator" onclick="appendValue('/')">÷</button>
      <button class="operator" onclick="appendValue('*')">×</button>

      <button class="number" onclick="appendValue('7')">7</button>
      <button class="number" onclick="appendValue('8')">8</button>
      <button class="number" onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('-')">−</button>

      <button class="number" onclick="appendValue('4')">4</button>
      <button class="number" onclick="appendValue('5')">5</button>
      <button class="number" onclick="appendValue('6')">6</button>
      <button class="operator" onclick="appendValue('+')">+</button>

      <button class="number" onclick="appendValue('1')">1</button>
      <button class="number" onclick="appendValue('2')">2</button>
      <button class="number" onclick="appendValue('3')">3</button>
      <button class="equal" onclick="calculate()">=</button>

      <button class="number" onclick="appendValue('0')" style="grid-column: span 2;">0</button>
      <button class="number" onclick="appendValue('.')">.</button>
    </div>
  </div>

  <script>
    let display = document.getElementById("display");
    let resetAfterEqual = false;

    function appendValue(value) {

      // Kalau habis "=" lalu pencet angka
      if (resetAfterEqual && !isOperator(value)) {
        display.value = "";
        resetAfterEqual = false;
      }

      // Kalau display masih 0
      if (display.value === "0" && value !== ".") {
        display.value = "";
      }

      // Validasi operator dobel
      let lastChar = display.value.slice(-1);

      if (isOperator(lastChar) && isOperator(value)) {
        return;
      }

      display.value += value;
    }

    function clearDisplay() {
      display.value = "0";
    }

    function calculate() {
      try {
        let expression = display.value;

        // Persen otomatis
        expression = expression.replace(/%/g, "/100");

        let result = eval(expression);

        // Validasi hasil
        if (!isFinite(result)) {
          display.value = "Error";
        } else {
          display.value = result;
        }

        // Setelah "=" layar otomatis reset saat angka dipencet
        resetAfterEqual = true;

      } catch {
        display.value = "Error";
      }
    }

    function isOperator(char) {
      return ['+', '-', '*', '/', '%'].includes(char);
    }
  </script>

</body>
</html>
